<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小飞英语单词闯关</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FEF9F0;
  --primary: #5B8FF9;
  --success: #5DCA5D;
  --danger: #FF6B6B;
  --gold: #FFB347;
  --text: #2D3748;
  --muted: #718096;
  --card: #FFFFFF;
  --shadow: 0 4px 20px rgba(0,0,0,0.08);
  --shadow-hover: 0 8px 30px rgba(0,0,0,0.12);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }

body {
  font-family: 'Nunito', 'Noto Sans SC', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

/* ─── Top Bar ─── */
.top-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  padding: 14px 16px 10px;
  border-bottom: 1px solid rgba(0,0,0,0.06);
}
.top-bar-inner { max-width: 480px; margin: 0 auto; display: flex; align-items: center; gap: 10px; }
.logo { font-family: 'Fredoka One', cursive; font-size: 18px; color: var(--primary); white-space: nowrap; }
.day-counter { background: var(--primary); color: white; font-weight: 800; font-size: 13px; padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
.progress-track { flex: 1; display: flex; gap: 4px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
.progress-track::-webkit-scrollbar { display: none; }

.day-dot {
  flex-shrink: 0; width: 14px; height: 14px; border-radius: 50%;
  background: #E2E8F0; border: 2px solid #CBD5E0;
  transition: all 0.3s; cursor: pointer; position: relative;
}
.day-dot.done { background: var(--gold); border-color: var(--gold); box-shadow: 0 0 6px rgba(255,179,71,0.4); }
.day-dot.today { border-color: var(--primary); background: var(--primary); animation: pulse 2s infinite; }
.day-dot.today.done { background: var(--gold); border-color: var(--gold); animation: none; }
.day-dot.locked { opacity: 0.4; cursor: not-allowed; }
.day-dot.active-day { transform: scale(1.2); }

@keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(91,143,249,0.4); } 50% { box-shadow: 0 0 0 5px rgba(91,143,249,0); } }

.day-lock-hint {
  font-size: 11px; color: var(--muted); text-align: center;
  padding: 6px 16px 0; font-family: 'Noto Sans SC', sans-serif;
}

/* ─── Main ─── */
.main-content { flex: 1; padding: 16px 16px 90px; max-width: 480px; margin: 0 auto; width: 100%; }

/* ─── Views ─── */
.view { display: none; }
.view.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ─── Day Selector ─── */
.day-tabs { display: flex; gap: 8px; overflow-x: auto; padding: 4px 0 12px; scrollbar-width: none; }
.day-tabs::-webkit-scrollbar { display: none; }
.day-tab {
  flex-shrink: 0; padding: 8px 14px; border-radius: 12px; font-size: 13px; font-weight: 700;
  border: 2px solid transparent; background: #EDF2F7; cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.day-tab.done { background: #FFF7E6; border-color: var(--gold); color: var(--gold); }
.day-tab.active { background: #EBF4FF; border-color: var(--primary); color: var(--primary); }
.day-tab.locked { opacity: 0.45; cursor: not-allowed; }
.day-tab-num { font-family: 'Nunito', sans-serif; }

/* ─── Section Title ─── */
.section-title { font-family: 'Fredoka One', cursive; font-size: 22px; color: var(--primary); margin-bottom: 6px; }
.section-sub { font-size: 13px; color: var(--muted); margin-bottom: 16px; }

/* ─── Word Card ─── */
.word-card {
  background: var(--card); border-radius: 20px; padding: 24px 20px;
  box-shadow: var(--shadow); margin-bottom: 16px;
  animation: cardIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
}
@keyframes cardIn { from { opacity: 0; transform: scale(0.9) translateY(16px); } to { opacity: 1; transform: scale(1) translateY(0); } }

.word-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
.speak-btn {
  width: 44px; height: 44px; border-radius: 50%; background: #EDF2F7;
  border: none; cursor: pointer; font-size: 20px; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.speak-btn:hover { background: var(--primary); transform: scale(1.08); }
.speak-btn:active { transform: scale(0.95); }
.speak-btn.speaking { background: var(--primary); animation: speakPulse 0.6s ease infinite; }
@keyframes speakPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(91,143,249,0.4); } 50% { box-shadow: 0 0 0 8px rgba(91,143,249,0); } }

.word-en {
  font-size: 44px; font-weight: 800; color: var(--primary);
  font-family: 'Nunito', sans-serif; line-height: 1.1;
  letter-spacing: 1px; word-break: break-all;
}
.word-divider { height: 2px; background: linear-gradient(90deg, var(--primary), transparent); margin: 14px 0; border-radius: 2px; opacity: 0.2; }
.word-means { display: flex; flex-direction: column; gap: 6px; }
.word-mean { font-size: 18px; color: var(--text); font-weight: 500; padding: 4px 0; display: flex; align-items: center; gap: 8px; }
.word-mean-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--primary); flex-shrink: 0; }
.word-sentence { font-size: 15px; color: var(--muted); font-style: italic; margin-top: 14px; padding-top: 12px; border-top: 1px solid #F1F5F4; line-height: 1.6; }

/* ─── Study Progress ─── */
.study-progress { display: flex; gap: 6px; justify-content: center; margin-bottom: 20px; }
.study-dot { width: 8px; height: 8px; border-radius: 50%; background: #E2E8F0; transition: all 0.3s; }
.study-dot.active { background: var(--primary); width: 20px; border-radius: 4px; }
.study-dot.done { background: var(--success); }

/* ─── Buttons ─── */
.btn-row { display: flex; gap: 10px; }
.btn { flex: 1; padding: 14px; border: none; border-radius: 50px; font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.2s; }
.btn:active { transform: scale(0.97); }
.btn-knew { background: #EDF2F7; color: var(--text); }
.btn-knew:hover { background: #E2E8F0; }
.btn-forgot { background: #FEE2E2; color: var(--danger); }
.btn-forgot:hover { background: #FED7D7; }
.btn-next { background: var(--primary); color: white; width: 100%; margin-top: 10px; }
.btn-next:hover { background: #4A7DE8; }
.btn-secondary { background: #EDF2F7; color: var(--text); width: 100%; margin-top: 8px; }

/* ─── Dictation ─── */
.dict-header { text-align: center; margin-bottom: 20px; }
.dict-day-label { font-family: 'Fredoka One', cursive; font-size: 20px; color: var(--primary); margin-bottom: 4px; }
.dict-progress-text { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
.progress-bar-outer { background: #EDF2F7; border-radius: 8px; height: 8px; overflow: hidden; margin-bottom: 24px; }
.progress-bar-inner { height: 100%; background: linear-gradient(90deg, var(--primary), #7CB8FF); border-radius: 8px; transition: width 0.4s cubic-bezier(0.34,1.56,0.64,1); }

.dict-prompt { text-align: center; margin-bottom: 16px; }
.dict-chinese { font-size: 36px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.dict-hint { font-size: 13px; color: var(--muted); }

.dict-input { width: 100%; padding: 14px 20px; font-size: 22px; font-family: 'Nunito', sans-serif; font-weight: 700; border: 3px solid #E2E8F0; border-radius: 16px; outline: none; transition: border-color 0.2s; text-align: center; letter-spacing: 2px; background: white; }
.dict-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(91,143,249,0.12); }
.dict-input.correct { border-color: var(--success); background: #F0FFF4; animation: pop 0.3s ease; }
.dict-input.wrong { border-color: var(--danger); background: #FFF5F5; animation: shake 0.4s ease; }
@keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.04)} 100%{transform:scale(1)} }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }

.dict-answer { text-align: center; padding: 14px; border-radius: 14px; margin-top: 12px; display: none; animation: fadeIn 0.3s ease; }
.dict-answer.show { display: block; }
.dict-answer.correct-a { background: #F0FFF4; }
.dict-answer.wrong-a { background: #FFF5F5; }
.answer-en { font-size: 26px; font-weight: 800; font-family: 'Nunito', sans-serif; }
.answer-en.correct-c { color: var(--success); }
.answer-en.wrong-c { color: var(--danger); }
.answer-zh { font-size: 14px; color: var(--muted); margin-top: 4px; }
.answer-msg { font-size: 16px; font-weight: 700; margin-top: 10px; color: var(--text); }

.dict-btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 50px; font-size: 17px; font-weight: 700; font-family: inherit; cursor: pointer; margin-top: 12px; transition: all 0.2s; }
.dict-btn:hover { background: #4A7DE8; }
.dict-btn:active { transform: scale(0.98); }
.dict-btn-next { display: none; margin-top: 8px; background: var(--success); }

/* ─── Feedback Toast ─── */
.toast {
  position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px);
  background: var(--text); color: white; padding: 12px 24px; border-radius: 50px;
  font-size: 16px; font-weight: 700; z-index: 999; white-space: nowrap;
  opacity: 0; transition: all 0.3s ease; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }
.toast.gold { background: var(--gold); color: var(--text); }

/* ─── Checkin Banner ─── */
.checkin-banner { background: linear-gradient(135deg, var(--primary), #7CB8FF); border-radius: 18px; padding: 18px 20px; color: white; margin-bottom: 20px; text-align: center; }
.checkin-banner-title { font-family: 'Fredoka One', cursive; font-size: 20px; margin-bottom: 4px; }
.checkin-banner-sub { font-size: 13px; opacity: 0.85; margin-bottom: 12px; }
.checkin-btn { background: white; color: var(--primary); border: none; border-radius: 50px; padding: 12px 28px; font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.2s; }
.checkin-btn:hover { transform: scale(1.04); }
.checkin-btn.done { background: rgba(255,255,255,0.5); color: white; cursor: default; transform: none; }

/* ─── Day Task Info ─── */
.task-info { background: #EBF4FF; border-radius: 14px; padding: 14px 16px; margin-bottom: 16px; border: 1px solid #C3DAFF; }
.task-info-label { font-size: 12px; color: var(--primary); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.task-info-title { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.task-info-sub { font-size: 13px; color: var(--muted); }

/* ─── Result Card ─── */
.result-card { background: var(--card); border-radius: 24px; padding: 32px 24px; box-shadow: var(--shadow); text-align: center; animation: cardIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
.result-emoji { font-size: 60px; margin-bottom: 16px; }
.result-title { font-family: 'Fredoka One', cursive; font-size: 28px; color: var(--primary); margin-bottom: 8px; }
.result-subtitle { font-size: 15px; color: var(--muted); margin-bottom: 24px; }
.result-stats { display: flex; gap: 12px; margin-bottom: 24px; }
.result-stat { flex: 1; background: #F7FAFC; border-radius: 14px; padding: 14px; }
.result-stat-num { font-size: 28px; font-weight: 800; color: var(--primary); }
.result-stat-label { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* ─── Stats / My ─── */
.stats-card { background: var(--card); border-radius: 20px; padding: 22px; box-shadow: var(--shadow); margin-bottom: 14px; text-align: center; }
.stats-num { font-family: 'Fredoka One', cursive; font-size: 56px; color: var(--primary); line-height: 1; }
.stats-label { font-size: 14px; color: var(--muted); margin-top: 4px; }

.wrong-list { background: var(--card); border-radius: 20px; padding: 20px; box-shadow: var(--shadow); }
.wrong-list-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
.wrong-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #F1F5F4; }
.wrong-item:last-child { border-bottom: none; }
.wrong-en { font-weight: 800; color: var(--primary); font-size: 16px; font-family: 'Nunito', sans-serif; }
.wrong-zh { color: var(--muted); font-size: 13px; margin-left: 8px; }
.wrong-speak { background: none; border: none; cursor: pointer; font-size: 18px; padding: 4px; }
.empty-state { text-align: center; padding: 28px; color: var(--muted); }
.empty-state-emoji { font-size: 44px; margin-bottom: 8px; }

/* ─── Bottom Nav ─── */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid rgba(0,0,0,0.06); padding: 8px 16px; padding-bottom: max(8px,env(safe-area-inset-bottom)); z-index: 100; }
.bottom-nav-inner { display: flex; gap: 6px; max-width: 480px; margin: 0 auto; }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 4px; border: none; background: none; cursor: pointer; border-radius: 14px; transition: all 0.2s; font-size: 10px; font-family: inherit; color: var(--muted); font-weight: 600; }
.nav-btn.active { background: #EBF4FF; color: var(--primary); }
.nav-icon { font-size: 22px; line-height: 1; }

/* ─── Modal ─── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 16px; }
.modal-overlay.show { display: flex; }
.modal-card { background: white; border-radius: 24px; padding: 36px 28px; text-align: center; max-width: 340px; width: 100%; animation: modalIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes modalIn { from{opacity:0;transform:scale(0.8) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }
.modal-emoji { font-size: 64px; margin-bottom: 14px; }
.modal-title { font-family: 'Fredoka One', cursive; font-size: 28px; color: var(--primary); margin-bottom: 8px; }
.modal-subtitle { font-size: 15px; color: var(--muted); margin-bottom: 22px; line-height: 1.6; }
.modal-btn { background: var(--primary); color: white; border: none; border-radius: 50px; padding: 13px 32px; font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.2s; }

/* Confetti */
.confetti-piece { position: absolute; width: 8px; height: 8px; border-radius: 2px; animation: confettiFall 1s ease-out forwards; }
@keyframes confettiFall { 0%{transform:translateY(-10px) rotate(0deg);opacity:1} 100%{transform:translateY(200px) rotate(720deg);opacity:0} }

/* ─── Review Mode ─── */
.review-bar { display: flex; gap: 6px; overflow-x: auto; padding: 4px 0 12px; scrollbar-width: none; }
.review-bar::-webkit-scrollbar { display: none; }
.rev-dot { width: 10px; height: 10px; border-radius: 50%; background: #E2E8F0; flex-shrink: 0; transition: all 0.3s; cursor: pointer; }
.rev-dot.active { background: var(--primary); transform: scale(1.3); }
.rev-dot.done { background: var(--success); }
.rev-dot.wrong { background: var(--danger); }

/* ─── Study Done State ─── */
.study-done { text-align: center; padding: 32px 16px; }
.study-done-emoji { font-size: 56px; margin-bottom: 14px; }
.study-done-title { font-family: 'Fredoka One', cursive; font-size: 24px; color: var(--primary); margin-bottom: 8px; }
.study-done-sub { font-size: 15px; color: var(--muted); margin-bottom: 20px; }
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar-inner">
    <div class="logo">🐦 小飞英语</div>
    <div class="day-counter" id="dayCounter">第1天</div>
    <div class="progress-track" id="progressTrack"></div>
  </div>
</div>
<div class="day-lock-hint" id="lockHint">每天最多解锁3天</div>

<div class="main-content">

  <!-- LEARN View -->
  <div class="view active" id="view-learn">
    <div class="section-title" id="dayTitle">第1天</div>
    <div class="section-sub" id="daySub">每天15个新词</div>

    <div class="checkin-banner" id="checkinBanner">
      <div class="checkin-banner-title" id="checkinTitle">今日打卡任务</div>
      <div class="checkin-banner-sub">完成学习+听写即可打卡</div>
      <button class="checkin-btn" id="checkinBtn" onclick="doCheckin()">🎯 我要打卡！</button>
    </div>

    <div class="task-info" id="taskInfo" style="display:none">
      <div class="task-info-label">今日任务</div>
      <div class="task-info-title" id="taskTitle"></div>
      <div class="task-info-sub" id="taskSub"></div>
    </div>

    <div class="study-progress" id="studyProgress"></div>
    <div id="wordCardArea"></div>
    <div id="learnActions"></div>
  </div>

  <!-- DICTATION View -->
  <div class="view" id="view-dict">
    <div class="dict-header">
      <div class="dict-day-label" id="dictDayLabel">第1天 · 听写</div>
      <div class="dict-progress-text" id="dictProgressText">0 / 15 正确</div>
      <div class="progress-bar-outer"><div class="progress-bar-inner" id="dictProgressBar" style="width:0%"></div></div>
      <div class="dict-prompt">
        <div class="dict-chinese" id="dictChinese">苹果</div>
        <div class="dict-hint">输入英文单词</div>
      </div>
    </div>
    <input type="text" class="dict-input" id="dictInput" placeholder="输入英文单词" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <div class="dict-answer" id="dictAnswer">
      <div class="answer-en" id="answerEn">apple</div>
      <div class="answer-zh" id="answerZh">苹果</div>
      <div class="answer-msg" id="answerMsg"></div>
    </div>
    <button class="dict-btn" id="dictSubmitBtn" onclick="submitDict()">确认</button>
    <button class="dict-btn dict-btn-next" id="dictNextBtn" onclick="nextDict()">下一题 →</button>
  </div>

  <!-- REVIEW View -->
  <div class="view" id="view-review">
    <div class="section-title">📚 错题复习</div>
    <div id="reviewContent"></div>
  </div>

  <!-- MY View -->
  <div class="view" id="view-my">
    <div class="section-title">🏆 我的进度</div>
    <div class="stats-card">
      <div class="stats-num" id="myDays">0</div>
      <div class="stats-label">已完成打卡天数 / 共21天</div>
    </div>
    <div id="myDayGrid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;"></div>
    <div class="wrong-list">
      <div class="wrong-list-title">📝 错题本</div>
      <div id="wrongListContent"></div>
    </div>
  </div>

</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div class="bottom-nav-inner">
    <button class="nav-btn active" id="nav-learn" onclick="switchView('learn')">
      <span class="nav-icon">📖</span><span>学习</span>
    </button>
    <button class="nav-btn" id="nav-dict" onclick="switchView('dict')">
      <span class="nav-icon">✏️</span><span>听写</span>
    </button>
    <button class="nav-btn" id="nav-review" onclick="switchView('review')">
      <span class="nav-icon">🔄</span><span>复习</span>
    </button>
    <button class="nav-btn" id="nav-my" onclick="switchView('my')">
      <span class="nav-icon">👤</span><span>我的</span>
    </button>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-card" id="modalCard">
    <div class="modal-emoji" id="modalEmoji">🎉</div>
    <div class="modal-title" id="modalTitle">打卡成功！</div>
    <div class="modal-subtitle" id="modalSubtitle">太棒了！</div>
    <button class="modal-btn" onclick="closeModal()">继续 💪</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─── Word Data ───────────────────────────────────────────────────────────
// Each word: english, means: [str], sentence: str
const WORD_LIST = [
  // Day 1
  {english:'I',means:['我'],sentence:'I am a student.'},
  {english:'you',means:['你','你们'],sentence:'You are my friend.'},
  {english:'he',means:['他'],sentence:'He is my father.'},
  {english:'she',means:['她'],sentence:'She is my mother.'},
  {english:'it',means:['它'],sentence:'It is a book.'},
  {english:'we',means:['我们'],sentence:'We are in the classroom.'},
  {english:'they',means:['他们','她们','它们'],sentence:'They are my friends.'},
  {english:'this',means:['这','这个'],sentence:'This is my bag.'},
  {english:'that',means:['那','那个'],sentence:'That is a window.'},
  {english:'what',means:['什么'],sentence:'What is this?'},
  {english:'who',means:['谁'],sentence:'Who is she?'},
  {english:'where',means:['在哪里','到哪里'],sentence:'Where is my pen?'},
  {english:'my',means:['我的'],sentence:'This is my book.'},
  {english:'your',means:['你的','你们的'],sentence:'Your bag is new.'},
  {english:'her',means:['她的'],sentence:'Her name is Amy.'},

// ─── State ──────────────────────────────────────────────────────────────
let state = {
  currentDay: 1,
  unlockedDays: [1,2,3],     // 每天最多解锁3天
  checkedInDays: Array(21).fill(0),
  wrongWords: [],            // {english, means, sentence}
  studyIndex: 0,
  studyKnown: [],            // bool[]
  dictIndex: 0,
  dictCorrect: 0,
  dictTotal: 0,
  dictAnswered: false,
  learnedSet: new Set(),    // set of english, for "不会" tracking
};

// ─── Storage ────────────────────────────────────────────────────────────
function load() {
  try {
    const s = localStorage.getItem('xf_v2');
    if (s) {
      const p = JSON.parse(s);
      state = { ...state, ...p };
      state.learnedSet = new Set(state.learnedSet);
    }
  } catch(e) {}
}
function save() {
  try {
    const s = {...state, learnedSet: [...state.learnedSet]};
    localStorage.setItem('xf_v2', JSON.stringify(s));
  } catch(e) {}
}
load();

// ─── TTS ───────────────────────────────────────────────────────────────
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.85;
  window.speechSynthesis.speak(u);
}

// ─── Helpers ───────────────────────────────────────────────────────────
function $(s) { return document.querySelector(s); }
function $$(s) { return document.querySelectorAll(s); }

function isUnlocked(day) {
  return state.unlockedDays.includes(day);
}

function getCurrentDayObj() {
  return DAYS[state.currentDay - 1];
}

// ─── Unlock Logic ───────────────────────────────────────────────────────
function tryUnlockNext() {
  const next = state.currentDay + 1;
  if (next > 21) return;
  if (!state.unlockedDays.includes(next)) {
    // keep unlocked days to max 3
    if (state.unlockedDays.length >= 3) {
      state.unlockedDays.shift(); // remove oldest
    }
    state.unlockedDays.push(next);
    save();
  }
}

// ─── Progress Track ─────────────────────────────────────────────────────
function renderProgressTrack() {
  const track = $('#progressTrack');
  track.innerHTML = '';
  for (let i = 1; i <= 21; i++) {
    const dot = document.createElement('div');
    dot.className = 'day-dot';
    dot.title = '第' + i + '天';
    if (state.checkedInDays[i-1] === 1) dot.classList.add('done');
    if (i === state.currentDay) dot.classList.add('today');
    if (!isUnlocked(i)) dot.classList.add('locked');
    if (i === state.currentDay) dot.classList.add('active-day');
    track.appendChild(dot);
  }
  $('#dayCounter').textContent = '第' + state.currentDay + '天';
}

// ─── Learn View ─────────────────────────────────────────────────────────
function renderLearnView() {
  const dayObj = getCurrentDayObj();
  $('#dayTitle').textContent = dayObj.title;
  $('#daySub').textContent = dayObj.sub;

  // task info
  if (dayObj.type === 'review' || dayObj.type === 'special' || dayObj.type === 'final') {
    $('#taskInfo').style.display = 'block';
    $('#taskTitle').textContent = dayObj.sub;
    $('#taskSub').textContent = dayObj.words.length + '个单词';
  } else {
    $('#taskInfo').style.display = 'none';
  }

  // checkin banner
  if (state.checkedInDays[state.currentDay-1] === 1) {
    $('#checkinBanner').style.background = 'linear-gradient(135deg, #5DCA5D, #7DD87D)';
    $('#checkinTitle').textContent = '今日已打卡 ✅';
    $('#checkinBtn').textContent = '已完成！';
    $('#checkinBtn').classList.add('done');
    $('#checkinBtn').disabled = true;
  } else {
    $('#checkinBanner').style.background = 'linear-gradient(135deg, var(--primary), #7CB8FF)';
    $('#checkinTitle').textContent = '今日打卡任务';
    $('#checkinBtn').textContent = '🎯 我要打卡！';
    $('#checkinBtn').classList.remove('done');
    $('#checkinBtn').disabled = false;
  }

  // init study if needed
  if (state.studyKnown.length !== dayObj.words.length) {
    state.studyKnown = new Array(dayObj.words.length).fill(false);
    state.studyIndex = 0;
  }

  renderStudyProgress();
  renderStudyWord();
  renderLearnActions();
  renderProgressTrack();
}

function renderStudyProgress() {
  const container = $('#studyProgress');
  container.innerHTML = '';
  const words = getCurrentDayObj().words;
  for (let i = 0; i < words.length; i++) {
    const dot = document.createElement('div');
    dot.className = 'study-dot';
    if (i === state.studyIndex) dot.classList.add('active');
    if (state.studyKnown[i]) dot.classList.add('done');
    container.appendChild(dot);
  }
}

function renderStudyWord() {
  const words = getCurrentDayObj().words;
  const area = $('#wordCardArea');

  if (state.studyIndex >= words.length) {
    // All words browsed
    area.innerHTML = `
      <div class="study-done">
        <div class="study-done-emoji">✅</div>
        <div class="study-done-title">浏览完成！</div>
        <div class="study-done-sub">开始听写测试吧</div>
        <button class="dict-btn" onclick="switchView('dict'); initDict()">开始听写 →</button>
      </div>`;
    $('#learnActions').innerHTML = '';
    return;
  }

  const w = words[state.studyIndex];
  area.innerHTML = `
    <div class="word-card">
      <div class="word-card-top">
        <button class="speak-btn" onclick="speak('${w.english.replace(/'/g,"\\'")}')">🔊</button>
        <span style="font-size:13px;color:var(--muted);margin-top:auto">${state.studyIndex+1} / ${words.length}</span>
      </div>
      <div class="word-en">${w.english}</div>
      <div class="word-divider"></div>
      <div class="word-means">
        ${w.means.map(m=>`<div class="word-mean"><span class="word-mean-dot"></span>${m}</div>`).join('')}
      </div>
      <div class="word-sentence">"${w.sentence}"</div>
    </div>`;
}

  const words = getCurrentDayObj().words;
  if (state.studyIndex >= words.length) {
    $('#learnActions').innerHTML = '';
    return;
  }
  $('#learnActions').innerHTML = `
    <div class="btn-row">
      <button class="btn btn-knew" onclick="markKnown(true)">认识了</button>
      <button class="btn btn-forgot" onclick="markKnown(false)">不会</button>
    </div>`;
}

function markKnown(known) {
  if (!known) {
    const w = getCurrentDayObj().words[state.studyIndex];
    if (!state.wrongWords.find(x => x.english === w.english)) {
      state.wrongWords.push(w);
      save();
    }
  }
  state.studyKnown[state.studyIndex] = known;
  state.studyIndex++;
  save();
  renderStudyProgress();
  renderStudyWord();
  renderLearnActions();
}

// ─── Dictation ───────────────────────────────────────────────────────────
function initDict() {
  const words = getCurrentDayObj().words;
  state.dictIndex = 0;
  state.dictCorrect = 0;
  state.dictTotal = words.length;
  state.dictAnswered = false;
  state.learnedSet = new Set();
  $('#dictDayLabel').textContent = getCurrentDayObj().title + ' · 听写';
  $('#dictProgressText').textContent = '0 / ' + state.dictTotal + ' 正确';
  $('#dictProgressBar').style.width = '0%';
  showDictWord();
}

function showDictWord() {
  const words = getCurrentDayObj().words;
  const w = words[state.dictIndex];
  $('#dictChinese').textContent = w.means[0];
  $('#dictInput').value = '';
  $('#dictInput').disabled = false;
  $('#dictInput').classList.remove('correct','wrong');
  $('#dictAnswer').classList.remove('show','correct-a','wrong-a');
  $('#dictSubmitBtn').style.display = '';
  $('#dictNextBtn').style.display = 'none';
  state.dictAnswered = false;
  $('#dictInput').focus();
}

const CORRECT_MSGS = ['对了！','不错！','继续保持！','厉害！','答对了！','正确！'];
const WRONG_MSGS = ['没关系，再想想。','再试一次。'];

function submitDict() {
  if (state.dictAnswered) return;
  const words = getCurrentDayObj().words;
  const w = words[state.dictIndex];
  const input = $('#dictInput').value.trim().toLowerCase();
  const correct = w.english.toLowerCase();
  state.dictAnswered = true;
  $('#dictInput').disabled = true;
  $('#dictSubmitBtn').style.display = 'none';

  const isCorrect = input === correct;
  if (isCorrect) {
    state.dictCorrect++;
    $('#dictInput').classList.add('correct');
    $('#dictAnswer').classList.add('show','correct-a');
    $('#dictAnswer').classList.remove('wrong-a');
    $('#answerEn').textContent = w.english;
    $('#answerEn').className = 'answer-en correct-c';
    $('#answerZh').innerHTML = w.means.join('；');
    $('#answerMsg').textContent = CORRECT_MSGS[Math.floor(Math.random()*CORRECT_MSGS.length)];
  } else {
    $('#dictInput').classList.add('wrong');
    $('#dictAnswer').classList.add('show','wrong-a');
    $('#dictAnswer').classList.remove('correct-a');
    $('#answerEn').textContent = correct;
    $('#answerEn').className = 'answer-en wrong-c';
    $('#answerZh').innerHTML = w.means.join('；');
    $('#answerMsg').textContent = WRONG_MSGS[Math.floor(Math.random()*WRONG_MSGS.length)];
    if (!state.wrongWords.find(x=>x.english===w.english)) {
      state.wrongWords.push(w);
      save();
    }
  }

  const pct = state.dictTotal > 0 ? (state.dictCorrect / state.dictTotal * 100) : 0;
  $('#dictProgressBar').style.width = pct + '%';
  $('#dictProgressText').textContent = state.dictCorrect + ' / ' + state.dictTotal + ' 正确';
  $('#dictNextBtn').style.display = '';
}

function nextDict() {
  state.dictIndex++;
  const words = getCurrentDayObj().words;
  if (state.dictIndex >= words.length) {
    showDictResult();
  } else {
    showDictWord();
  }
}

function showDictResult() {
  const dayObj = getCurrentDayObj();
  const rate = state.dictTotal > 0 ? Math.round(state.dictCorrect / state.dictTotal * 100) : 0;
  const emoji = rate >= 90 ? '🌟' : rate >= 70 ? '💪' : rate >= 60 ? '👍' : '💡';
  const title = rate >= 80 ? '太棒了！' : rate >= 60 ? '不错！' : '继续加油！';

  $('#view-dict').innerHTML = `
    <div class="result-card">
      <div class="result-emoji">${emoji}</div>
      <div class="result-title">${title}</div>
      <div class="result-subtitle">${dayObj.title}听写完成</div>
      <div class="result-stats">
        <div class="result-stat"><div class="result-stat-num">${state.dictCorrect}</div><div class="result-stat-label">正确</div></div>
        <div class="result-stat"><div class="result-stat-num">${state.dictTotal - state.dictCorrect}</div><div class="result-stat-label">错误</div></div>
        <div class="result-stat"><div class="result-stat-num">${rate}%</div><div class="result-stat-label">正确率</div></div>
      </div>
      <button class="dict-btn" onclick="switchView('learn')" style="margin-top:8px">返回学习</button>
    </div>`;
}

// ─── Checkin ─────────────────────────────────────────────────────────────
function doCheckin() {
  if (state.checkedInDays[state.currentDay-1] === 1) return;
  state.checkedInDays[state.currentDay-1] = 1;
  tryUnlockNext();
  save();
  renderLearnView();
  renderMyPage();
  showModal('🎉', state.currentDay + '天打卡完成！', '坚持下去，明天继续！');
}

// ─── Review Mode ─────────────────────────────────────────────────────────
function switchToReview() {
  switchView('review');
  renderReview();
}

function renderReview() {
  const content = $('#reviewContent');
  if (state.wrongWords.length === 0) {
    content.innerHTML = '<div class="empty-state"><div class="empty-state-emoji">🎉</div><div>错题本是空的！继续保持！</div></div>';
    return;
  }

  window.revIdx = 0;
  window.revDone = false;

  const html = `
    <div style="text-align:center;margin-bottom:14px;font-size:14px;color:var(--muted);">共${state.wrongWords.length}个错词</div>
    <div class="dict-prompt" style="margin-bottom:16px">
      <div class="dict-chinese" id="revChinese">-</div>
    </div>
    <input type="text" class="dict-input" id="revInput" placeholder="输入英文单词" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" style="margin-bottom:12px">
    <div class="dict-answer" id="revAnswer">
      <div class="answer-en" id="revEn"></div>
      <div class="answer-zh" id="revZh"></div>
    </div>
    <button class="dict-btn" id="revSubmitBtn" onclick="submitReview()">确认</button>
    <button class="dict-btn dict-btn-next" id="revNextBtn" onclick="nextReview()" style="display:none;background:var(--success)">下一题 →</button>
  `;
  content.innerHTML = html;

  setTimeout(() => {
    $('#revInput').addEventListener('keypress', e => { if (e.key === 'Enter') submitReview(); });
    showRevWord();
  }, 60);
}

function showRevWord() {
  if (window.revIdx >= state.wrongWords.length) {
    $('#reviewContent').innerHTML = `<div class="result-card"><div class="result-emoji">🎉</div><div class="result-title">复习完成！</div><div class="result-subtitle">已经把错题过了一遍</div><button class="dict-btn" onclick="renderReview()">再来一遍</button></div>`;
    return;
  }
  const w = state.wrongWords[window.revIdx];
  $('#revChinese').textContent = w.means[0];
  $('#revInput').value = '';
  $('#revInput').disabled = false;
  $('#revInput').classList.remove('correct','wrong');
  $('#revAnswer').classList.remove('show','correct-a','wrong-a');
  $('#revSubmitBtn').style.display = '';
  $('#revNextBtn').style.display = 'none';
  window.revAnswered = false;
  $('#revInput').focus();
}

function submitReview() {
  if (window.revAnswered) return;
  const w = state.wrongWords[window.revIdx];
  const input = $('#revInput').value.trim().toLowerCase();
  window.revAnswered = true;
  $('#revInput').disabled = true;
  $('#revSubmitBtn').style.display = 'none';
  const isCorrect = input === w.english.toLowerCase();
  if (isCorrect) {
    $('#revInput').classList.add('correct');
    $('#revAnswer').classList.add('show','correct-a');
    $('#revAnswer').classList.remove('wrong-a');
    $('#revEn').textContent = w.english;
    $('#revEn').className = 'answer-en correct-c';
    $('#revZh').innerHTML = w.means.join('；');
    // Remove from wrong words if correct
    state.wrongWords.splice(window.revIdx, 1);
    save();
    window.revIdx--;
  } else {
    $('#revInput').classList.add('wrong');
    $('#revAnswer').classList.add('show','wrong-a');
    $('#revAnswer').classList.remove('correct-a');
    $('#revEn').textContent = w.english;
    $('#revEn').className = 'answer-en wrong-c';
    $('#revZh').innerHTML = w.means.join('；');
  }
  $('#revNextBtn').style.display = '';
  window.revIdx++;
}

function nextReview() {
  showRevWord();
}

// ─── My Page ─────────────────────────────────────────────────────────────
function renderMyPage() {
  const done = state.checkedInDays.reduce((a,b)=>a+b,0);
  $('#myDays').textContent = done;

  const grid = $('#myDayGrid');
  grid.innerHTML = '';
  for (let i = 1; i <= 21; i++) {
    const box = document.createElement('div');
    box.style.cssText = 'background:var(--card);border-radius:12px;padding:12px 8px;text-align:center;box-shadow:var(--shadow);';
    box.innerHTML = `<div style="font-family:'Fredoka One',cursive;font-size:20px;color:var(--primary)">${i}</div>`;
    if (state.checkedInDays[i-1] === 1) {
      box.style.background = '#FFF7E6';
      box.style.border = '2px solid var(--gold)';
      box.innerHTML += `<div style="font-size:12px;color:var(--gold)">✅ 完成</div>`;
    } else if (i === state.currentDay) {
      box.style.background = '#EBF4FF';
      box.style.border = '2px solid var(--primary)';
      box.innerHTML += `<div style="font-size:12px;color:var(--primary)">🔥 今天</div>`;
    } else if (!isUnlocked(i)) {
      box.style.opacity = '0.4';
      box.innerHTML += `<div style="font-size:12px;color:var(--muted)">🔒</div>`;
    } else {
      box.innerHTML += `<div style="font-size:12px;color:var(--muted)">○ 待解锁</div>`;
    }
    box.onclick = () => { if (isUnlocked(i)) { state.currentDay = i; switchView('learn'); renderLearnView(); } };
    grid.appendChild(box);
  }

  const wl = $('#wrongListContent');
  if (state.wrongWords.length === 0) {
    wl.innerHTML = '<div class="empty-state"><div class="empty-state-emoji">🌟</div><div>暂时没有错题，太棒了！</div></div>';
  } else {
    wl.innerHTML = state.wrongWords.map(w => `
      <div class="wrong-item">
        <span><span class="wrong-en">${w.english}</span> <span class="wrong-zh">${w.means[0]}</span></span>
        <button class="wrong-speak" onclick="speak('${w.english.replace(/'/g,"\\'")}')">🔊</button>
      </div>`).join('');
  }
}

// ─── View Switching ───────────────────────────────────────────────────────
function switchView(name) {
  $$('.view').forEach(v=>v.classList.remove('active'));
  $$('.nav-btn').forEach(b=>b.classList.remove('active'));
  $('#view-'+name).classList.add('active');
  $('#nav-'+name).classList.add('active');

  if (name === 'learn') renderLearnView();
  if (name === 'dict') { initDict(); }
  if (name === 'review') renderReview();
  if (name === 'my') renderMyPage();
}

// ─── Modal ────────────────────────────────────────────────────────────────
function showModal(emoji, title, subtitle) {
  $('#modalEmoji').textContent = emoji;
  $('#modalTitle').textContent = title;
  $('#modalSubtitle').textContent = subtitle;
  $('#modal').classList.add('show');
  spawnConfetti();
}

function closeModal() { $('#modal').classList.remove('show'); }
$('#modal').addEventListener('click', e => { if (e.target === $('#modal')) closeModal(); });

function spawnConfetti() {
  const card = $('#modalCard');
  const colors = ['#FF6B6B','#FFB347','#5DCA5D','#5B8FF9','#A855F7'];
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = (Math.random()*100)+'%';
    p.style.top = '0';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDelay = (Math.random()*0.4)+'s';
    p.style.animationDuration = (0.8+Math.random()*0.4)+'s';
    card.appendChild(p);
    setTimeout(()=>p.remove(), 1500);
  }
}

// ─── Dictation Enter Key ─────────────────────────────────────────────────
$('#dictInput').addEventListener('keypress', e => { if (e.key === 'Enter') submitDict(); });

// ─── Init ─────────────────────────────────────────────────────────────────
renderLearnView();
</script>
</body>
</html>
